<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - North East Krishi Mitra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-page">

    <header>
        <div class="logo">
            <img src="logo-header.png" alt="North East Krishi Mitra logo">
            <h1>Krishi Mitra</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="registration-details.html" class="login-btn">Login / Register</a></li>
                <li><a href="admin-login.html" class="login-btn">Admin Login</a></li>
            </ul>
        </nav>
        <div class="language-select">
            <select>
                <option value="en">English</option>
                <option value="hi">हिन्दी</option>
                <option value="local">Local</option>
            </select>
        </div>
    </header>

    <main class="auth-section">
        <h2>Admin Login</h2>
        <div class="auth-card">
            <h3>Admin Credentials</h3>
            <form class="details-form" id="admin-login-form" novalidate>
                <input type="text" name="adminId" placeholder="Admin Username / Email" autocomplete="username" required>
                <input type="password" name="password" placeholder="Password" autocomplete="current-password" minlength="6" required>
                <div class="auth-actions">
                    <button type="submit" class="primary">Login</button>
                    <a href="index.html" class="secondary auth-link-button">Back</a>
                </div>
                <p class="auth-message" id="admin-message"></p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 North East Krishi Mitra. All rights reserved.</p>
        <p>Empowering the farming community for a better tomorrow.</p>
    </footer>

    <script>
        const form = document.getElementById("admin-login-form");
        const messageEl = document.getElementById("admin-message");

        function setMessage(message, isError) {
            messageEl.textContent = message;
            messageEl.classList.remove("error", "success");
            if (message) {
                messageEl.classList.add(isError ? "error" : "success");
            }
        }

        form.addEventListener("submit", (e) => {
            e.preventDefault();
            setMessage("", false);

            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            // UI-only placeholder (wire this to backend when admin auth is ready)
            setMessage("Admin login page ready. Backend connection can be added next.", false);
        });
    </script>

</body>
</html>
